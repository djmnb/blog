<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../js/vue.js"></script>
</head>
<body>
    
    <div id="root">
        <test v-model="value"></test>
    </div>

    <script>

        const test = {
            template:`  
                <input type="text"  :value="value" @input="update"></input>
            `,
            data(){
                return {

                }
            },
            props:['value'],
            mounted(){
                console.log(this)
            },
            methods:{
                update(event){
                    this.$emit("input",event.target.value)
                }
            }
        }

        new Vue({
            el:"#root",
            data(){
                return {
                    message:"hello",
                    value:""
                }
            },
            components:{
                test
            }
        })
    </script>

</body>
</html>
